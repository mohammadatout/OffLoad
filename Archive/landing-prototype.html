<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>OffLoad — Entity Resolution Studio</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500&display=swap');

  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #F4F2EC;
    --text: #0A0A0A;
    --muted: #6B6B6B;
    --cta-fill: #0A0A0A;
    --highlight: #D9D9D9;
    --grid-color: rgba(10,10,10,0.04);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    min-height: 100vh;
    overflow: hidden;
    position: relative;
  }

  /* Faint background grid */
  .bg-grid {
    position: fixed;
    inset: 0;
    pointer-events: none;
    background-image:
      linear-gradient(var(--grid-color) 1px, transparent 1px),
      linear-gradient(90deg, var(--grid-color) 1px, transparent 1px);
    background-size: 80px 80px;
    z-index: 0;
  }

  /* Pixel shimmer background graphic */
  .bg-graphic {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 700px;
    height: 700px;
    pointer-events: none;
    z-index: 0;
    opacity: 0.08;
  }

  /* ===== NAV ===== */
  nav {
    position: relative;
    z-index: 10;
    max-width: 1360px;
    margin: 0 auto;
    padding: 24px 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    animation: fadeDown 0.8s ease-out both;
  }
  @keyframes fadeDown {
    from { opacity: 0; transform: translateY(-12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .logo {
    display: flex;
    align-items: baseline;
    gap: 4px;
  }
  .logo-name {
    font-family: 'DM Serif Display', serif;
    font-size: 22px;
    letter-spacing: -0.02em;
  }
  .logo-tm {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    color: var(--muted);
    text-transform: uppercase;
  }

  .nav-links {
    display: flex;
    align-items: center;
    gap: 32px;
    list-style: none;
  }
  .nav-links a {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--muted);
    text-decoration: none;
    transition: color 0.3s;
  }
  .nav-links a:hover { color: var(--text); }

  /* ===== HERO — centered layout ===== */
  .hero {
    position: relative;
    z-index: 10;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    min-height: calc(100vh - 80px);
    padding: 0 48px;
  }

  .eyebrow {
    display: flex;
    align-items: center;
    gap: 12px;
    margin-bottom: 32px;
    animation: fadeUp 0.7s ease-out 0.2s both;
  }
  .eyebrow-line {
    width: 32px;
    height: 1px;
    background: var(--text);
  }
  .eyebrow-text {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }

  h1 {
    font-family: 'DM Serif Display', serif;
    font-weight: 400;
    font-size: clamp(3.5rem, 9vw, 8.5rem);
    line-height: 0.95;
    letter-spacing: -0.03em;
    margin-bottom: 24px;
    animation: fadeUp 0.8s ease-out 0.35s both;
  }

  .highlight {
    position: relative;
    display: inline-block;
  }
  .highlight::after {
    content: '';
    position: absolute;
    left: -4px;
    right: -4px;
    bottom: 0.05em;
    height: 0.18em;
    background: var(--highlight);
    z-index: -1;
    transform: scaleX(0);
    transform-origin: left;
    animation: wipeIn 0.6s ease-out 1.1s forwards;
  }
  @keyframes wipeIn {
    to { transform: scaleX(1); }
  }

  .subhead {
    font-size: 17px;
    line-height: 1.6;
    color: #3A3A36;
    max-width: 440px;
    margin-bottom: 48px;
    animation: fadeUp 0.8s ease-out 0.5s both;
  }

  /* ===== CTA BUTTONS — the main event ===== */
  .cta-group {
    display: flex;
    align-items: center;
    gap: 16px;
    animation: fadeUp 0.8s ease-out 0.65s both;
  }

  .btn {
    font-family: 'Inter', sans-serif;
    font-size: 15px;
    font-weight: 500;
    border: none;
    cursor: pointer;
    border-radius: 999px;
    height: 52px;
    padding: 0 32px;
    display: inline-flex;
    align-items: center;
    gap: 10px;
    transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    text-decoration: none;
  }

  .btn-primary {
    background: var(--cta-fill);
    color: #fff;
  }
  .btn-primary:hover {
    background: #1a1a1a;
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(10,10,10,0.15);
  }
  .btn-primary .arrow {
    width: 28px;
    height: 28px;
    border-radius: 50%;
    background: rgba(255,255,255,0.12);
    display: flex;
    align-items: center;
    justify-content: center;
    transition: transform 0.3s ease;
  }
  .btn-primary:hover .arrow {
    transform: translateX(2px);
  }
  .btn-primary .arrow svg {
    width: 14px;
    height: 14px;
    stroke: #fff;
    stroke-width: 2;
    fill: none;
  }

  .btn-secondary {
    background: transparent;
    color: var(--text);
    border: 1.5px solid var(--text);
  }
  .btn-secondary:hover {
    background: rgba(10,10,10,0.05);
    transform: translateY(-1px);
  }

  /* ===== STAT STRIP ===== */
  .stat-strip {
    position: fixed;
    bottom: 0;
    left: -40px;
    right: -40px;
    z-index: 10;
    border-top: 1px solid rgba(10,10,10,0.12);
    background: var(--bg);
    overflow: hidden;
    padding: 20px 0;
  }
  .stat-track {
    display: flex;
    gap: 80px;
    animation: marquee 40s linear infinite;
    width: max-content;
  }
  @keyframes marquee {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }
  .stat-item {
    display: flex;
    align-items: baseline;
    gap: 12px;
    white-space: nowrap;
  }
  .stat-val {
    font-family: 'DM Serif Display', serif;
    font-size: 36px;
    letter-spacing: -0.02em;
  }
  .stat-caption {
    display: flex;
    flex-direction: column;
  }
  .stat-label {
    font-size: 12px;
    color: var(--muted);
    line-height: 1.3;
  }
  .stat-brand {
    font-family: 'JetBrains Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
    margin-top: 2px;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* Responsive */
  @media (max-width: 768px) {
    nav { padding: 16px 24px; }
    .nav-links { display: none; }
    .hero { padding: 0 24px; }
    .cta-group { flex-direction: column; }
    .btn { width: 100%; justify-content: center; }
  }
</style>
</head>
<body>

<div class="bg-grid"></div>

<!-- Pixel shimmer canvas -->
<canvas class="bg-graphic" id="shimmer"></canvas>

<!-- Nav -->
<nav>
  <div class="logo">
    <span class="logo-name">OffLoad</span>
    <span class="logo-tm">TM</span>
  </div>
  <ul class="nav-links">
    <li><a href="#">Product</a></li>
    <li><a href="#">How it works</a></li>
    <li><a href="#">Engine</a></li>
    <li><a href="#">Docs</a></li>
  </ul>
</nav>

<!-- Hero -->
<section class="hero">
  <div class="eyebrow">
    <span class="eyebrow-line"></span>
    <span class="eyebrow-text">Entity resolution studio</span>
  </div>

  <h1>From mess<br>to <span class="highlight">match.</span></h1>

  <p class="subhead">
    Normalize, deduplicate, and match company records
    across systems — in seconds, not sprints.
  </p>

  <div class="cta-group">
    <a href="#" class="btn btn-primary" id="btn-start-mapping">
      Start Mapping
      <span class="arrow">
        <svg viewBox="0 0 24 24"><path d="M5 12h14M13 6l6 6-6 6"/></svg>
      </span>
    </a>
    <a href="#" class="btn btn-secondary" id="btn-login">
      Login
    </a>
  </div>
</section>

<!-- Stat strip marquee -->
<div class="stat-strip">
  <div class="stat-track" id="stat-track">
    <!-- filled by JS to create seamless loop -->
  </div>
</div>

<script>
// ======== Pixel shimmer background ========
(function() {
  const c = document.getElementById('shimmer');
  const ctx = c.getContext('2d');
  const dpr = window.devicePixelRatio || 1;

  function resize() {
    const r = c.getBoundingClientRect();
    c.width = r.width * dpr;
    c.height = r.height * dpr;
    ctx.scale(dpr, dpr);
  }
  resize();
  window.addEventListener('resize', resize);

  const rects = Array.from({ length: 320 }, () => ({
    x: (Math.random() - 0.5) * 600,
    y: (Math.random() - 0.5) * 600,
    w: 3 + Math.random() * 10,
    h: 3 + Math.random() * 10,
    phase: Math.random() * Math.PI * 2,
    speed: 0.3 + Math.random() * 0.8,
  }));

  let t = 0;
  function draw() {
    const w = c.width / dpr;
    const h = c.height / dpr;
    ctx.clearRect(0, 0, w, h);
    const cx = w / 2;
    const cy = h / 2;
    t += 0.008;

    rects.forEach(r => {
      const alpha = 0.15 + 0.35 * (0.5 + 0.5 * Math.sin(t * r.speed + r.phase));
      ctx.fillStyle = `rgba(10,10,10,${alpha})`;
      ctx.fillRect(cx + r.x, cy + r.y, r.w, r.h);
    });

    requestAnimationFrame(draw);
  }
  draw();
})();

// ======== Stat marquee ========
(function() {
  const stats = [
    { val: '1,228',  label: 'rows matched in <1s',   brand: 'CISCO SALES' },
    { val: '99%',    label: 'match accuracy',         brand: 'BENCHMARK' },
    { val: '40%',    label: 'avg deduplication',      brand: 'AMERICAS' },
    { val: '6',      label: 'data sources unified',   brand: 'PIPELINE' },
    { val: '300%',   label: 'faster deployment',      brand: 'STRIPE' },
    { val: '20 days',label: 'time saved per quarter', brand: 'ENTERPRISE' },
  ];

  const track = document.getElementById('stat-track');
  const html = stats.map(s => `
    <div class="stat-item">
      <span class="stat-val">${s.val}</span>
      <span class="stat-caption">
        <span class="stat-label">${s.label}</span>
        <span class="stat-brand">${s.brand}</span>
      </span>
    </div>
  `).join('');

  // duplicate for seamless loop
  track.innerHTML = html + html;
})();
</script>

</body>
</html>
